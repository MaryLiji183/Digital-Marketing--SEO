<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalBoost | Quantum Auth</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- 1. Variables & Global --- */
        :root {
            --primary: #6366f1;
            --secondary: #f43f5e;
            --accent: #10b981;
            --glass: rgba(255, 255, 255, 0.75);
            --bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(244, 63, 94, 0.15), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.05), transparent 50%);
        }

        /* --- 2. Main Layout Container --- */
        .auth-wrapper {
            position: relative;
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- 3. Floating Branding Box --- */
        .floating-info {
            width: 380px;
            padding: 50px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border-radius: 40px;
            color: white;
            z-index: 10;
            box-shadow: 20px 30px 60px rgba(99, 102, 241, 0.3);
            margin-right: -80px; /* Pulls the card under the box */
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- 4. Registration Card --- */
        .registration-card {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            padding: 60px 60px 60px 120px; /* Left padding accommodates overlap */
            box-shadow: 0 40px 80px rgba(0,0,0,0.05);
        }

        .form-header { margin-bottom: 35px; }
        .form-header h1 { font-family: 'Space Grotesk'; font-size: 42px; letter-spacing: -2px; line-height: 1; }
        .form-header p { color: var(--text-muted); font-weight: 600; margin-top: 10px; }

        /* --- 5. Form Elements --- */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .field { margin-bottom: 20px; position: relative; }
        .field label { 
            display: block; font-size: 11px; font-weight: 800; 
            color: var(--primary); text-transform: uppercase; 
            margin-bottom: 8px; letter-spacing: 1px;
        }

        .input-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-box i { position: absolute; left: 20px; color: #94a3b8; transition: 0.3s; z-index: 2; }

        .input-box input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            border-radius: 20px;
            border: 2px solid transparent;
            background: #f1f5f9;
            font-weight: 600;
            font-family: inherit;
            transition: 0.4s;
        }

        .input-box input:focus {
            outline: none;
            background: white;
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.1);
        }

        .input-box input:focus + i { color: var(--primary); transform: scale(1.1); }

        /* --- 6. Controls --- */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-main {
            padding: 18px 40px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
            white-space: nowrap;
        }

        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4); }

        .social-lite { display: flex; gap: 10px; }
        .social-circle {
            width: 55px; height: 55px;
            border-radius: 18px;
            border: 2px solid #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; transition: 0.3s;
            background: white;
        }
        .social-circle:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-3px); }

        /* --- 7. Responsive Design --- */
        @media (max-width: 1024px) {
            .auth-wrapper { flex-direction: column; }
            .floating-info { 
                width: 100%; 
                margin-right: 0; 
                margin-bottom: -40px; 
                animation: none; 
                border-radius: 30px; 
            }
            .registration-card { 
                padding: 80px 40px 40px; 
                border-radius: 30px; 
                width: 100%;
            }
        }

        @media (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: stretch; }
            .btn-main { width: 100%; }
            .social-lite { justify-content: center; }
        }
    </style>
</head>
<body>

    <main class="auth-wrapper">
        <aside class="floating-info">
            <div style="font-size: 24px; font-weight: 800; margin-bottom: 40px;">
                <i class="fas fa-layer-group"></i> DigitalBoost.
            </div>
            <h2 style="font-family: 'Space Grotesk'; font-size: 32px; margin-bottom: 20px; line-height: 1.2;">The Next Era of SaaS Management.</h2>
            <ul style="list-style: none; font-weight: 600; font-size: 14px; opacity: 0.9;">
                <li style="margin-bottom: 15px;"><i class="fas fa-check-circle"></i> 100% Quantum Encryption</li>
                <li style="margin-bottom: 15px;"><i class="fas fa-check-circle"></i> Instant Node Deployment</li>
                <li><i class="fas fa-check-circle"></i> 24/7 Neural Support</li>
            </ul>
        </aside>

        <section class="registration-card">
            <header class="form-header">
                <h1>Digital<span style="color: var(--primary);">Boost.</span></h1>
                <p>Configure your workspace identity below.</p>
            </header>

            <form id="authForm">
                <div class="input-grid">
                    <div class="field">
                        <label>First Name</label>
                        <div class="input-box">
                            <i class="fas fa-id-badge"></i>
                            <input type="text" placeholder="John" required>
                        </div>
                    </div>
                    <div class="field">
                        <label>Last Name</label>
                        <div class="input-box">
                            <i class="fas fa-tag"></i>
                            <input type="text" placeholder="Doe" required>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label>Enterprise Email</label>
                    <div class="input-box">
                        <i class="fas fa-envelope-open-text"></i>
                        <input type="email" placeholder="john@company.ai" required>
                    </div>
                </div>

                <div class="field">
                    <label>Secure Keyphrase</label>
                    <div class="input-box">
                        <i class="fas fa-key"></i>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="controls">
                    <button type="submit" class="btn-main" id="submitBtn">
                        INITIALIZE ACCOUNT <i class="fas fa-arrow-right" style="margin-left: 10px;"></i>
                    </button>
                    
                    <div class="social-lite">
                        <div class="social-circle"><i class="fab fa-google"></i></div>
                        <div class="social-circle"><i class="fab fa-github"></i></div>
                    </div>
                </div>
            </form>

            <footer style="margin-top: 40px; font-size: 14px; font-weight: 600; color: #94a3b8;">
                Already part of the ecosystem? <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 800;">Sign In</a>
            </footer>
        </section>
    </main>

    <script>
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SYNCING...';
            btn.style.background = 'var(--accent)';
            
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-check"></i> ACCESS GRANTED';
            }, 1500);
        });
    </script>
</body>
</html>
