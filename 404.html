<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | DigitalBoost</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- 1. Variables & Global Reset --- */
        :root {
            --primary: #4f46e5;
            --accent: #06b6d4;
            --bg: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --glass-white: rgba(255, 255, 255, 0.8);
            --shadow: 0 20px 50px rgba(79, 70, 229, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(79, 70, 229, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
        }

        /* --- 2. Layout Wrapper --- */
        .error-wrapper {
            width: 90%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            gap: 20px;
            perspective: 1000px;
            text-align: center;
        }

        /* --- 3. Visual Components --- */
        .visual-side {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .huge-number {
            font-size: clamp(8rem, 20vw, 18rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            filter: drop-shadow(0 10px 20px rgba(79, 70, 229, 0.2));
            opacity: 0.9;
        }

        .floating-icon {
            position: absolute;
            font-size: 60px;
            color: var(--primary);
            animation: bounce 4s ease-in-out infinite;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.1));
            z-index: -1;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        /* --- 4. Content Card --- */
        .content-card {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 40px;
            border: 1px solid white;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 2;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 20px;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #ef4444;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 25px;
        }

        .status-pill::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -1.5px;
            line-height: 1.1;
        }

        p {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.7;
        }

        /* --- 5. Action Group --- */
        .action-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 18px 35px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
        }

        .btn-secondary {
            background: white;
            color: var(--text-dark);
            border: 1px solid #e2e8f0;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        /* --- 6. Desktop Refinements --- */
        @media (min-width: 992px) {
            .error-wrapper { 
                grid-template-columns: 1fr 1fr; 
                text-align: left;
                gap: 40px;
            }

            .visual-side { justify-content: flex-start; }

            .content-card { padding: 60px; }

            .status-pill { justify-content: flex-start; }

            .action-group { flex-direction: row; }

            .floating-icon { 
                font-size: 80px; 
                right: 15%; 
                top: 20%; 
                z-index: 2;
            }

            .huge-number { margin-bottom: 0; }
        }
    </style>
</head>
<body>

    <div class="error-wrapper">
        <div class="visual-side">
            <div class="huge-number">404</div>
            <div class="floating-icon">
                <i class="fas fa-compass"></i>
            </div>
        </div>

        <div class="content-side">
            <div class="content-card" id="tilt-card">
                <div class="status-pill">COORDINATES_INVALID</div>
                
                <h1>Off the Grid? <br> Let's Get Back.</h1>
                
                <p>The page you're searching for has vanished into the digital static. Our systems show the route is no longer active.</p>
                
                <div class="action-group">
                    <a href="index.html" class="btn btn-primary">
                        <i class="fas fa-home"></i> Return Home
                    </a>
                    <a href="support.html" class="btn btn-secondary">
                        <i class="fas fa-life-ring"></i> Get Help
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Interactive Tilt Effect
        const card = document.getElementById('tilt-card');
        const wrapper = document.body;

        // Apply tilt only on desktop for better UX
        if (window.innerWidth > 992) {
            wrapper.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.clientX) / 40;
                const y = (window.innerHeight / 2 - e.clientY) / 40;
                
                card.style.transform = `rotateX(${y}deg) rotateY(${-x}deg)`;
            });

            // Reset on mouse leave
            wrapper.addEventListener('mouseleave', () => {
                card.style.transition = "all 0.5s ease";
                card.style.transform = `rotateX(0deg) rotateY(0deg)`;
            });

            wrapper.addEventListener('mouseenter', () => {
                card.style.transition = "none";
            });
        }
    </script>
</body>
</html>
