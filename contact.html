<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalBoost | Contact Synthesis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #06b6d4;
            --bg: #fdfdff;
            --glass: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: rgba(99, 102, 241, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            /* Advanced Aurora Gradient Background */
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 45%),
                radial-gradient(at 100% 0%, rgba(6, 182, 212, 0.1) 0px, transparent 45%),
                radial-gradient(at 50% 100%, rgba(168, 85, 247, 0.05) 0px, transparent 50%);
        }

        .container { max-width: 1000px; margin: auto; padding: 0 20px; }

        /* --- Refined Header Alignment --- */
        .page-header {
            text-align: center;
            padding: 100px 0 60px;
        }
        .page-header h1 { 
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 5vw, 3.5rem); 
            letter-spacing: -2px;
            margin-bottom: 15px; 
        }
        .page-header p { color: var(--text-muted); font-size: 18px; font-weight: 500; }

        /* --- Elevated Form Alignment --- */
        .contact-wrapper {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid white;
            padding: 60px;
            border-radius: 50px;
            box-shadow: 0 40px 100px rgba(99, 102, 241, 0.08);
            margin-bottom: 60px;
            position: relative;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .full-width { grid-column: span 2; }

        .field-group { position: relative; }
        .field-group label {
            font-size: 11px; font-weight: 800; color: var(--primary);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 8px; display: block; margin-left: 10px;
        }

        .input-ctrl {
            width: 100%;
            background: white;
            border: 2px solid var(--border);
            padding: 16px 20px;
            border-radius: 20px;
            font-family: inherit;
            font-weight: 600;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .input-ctrl:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .btn-reveal {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white; border: none; border-radius: 20px;
            font-weight: 800; font-size: 16px; cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.25);
            margin-top: 20px;
        }

        .btn-reveal:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 45px rgba(99, 102, 241, 0.35);
        }

        /* --- Horizontal Info Rail (Corrected Alignment) --- */
        .info-rail {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 100px;
        }

        .rail-item {
            background: white;
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            transition: 0.3s;
        }

        .rail-item:hover { border-color: var(--primary); transform: translateY(-5px); }

        .rail-icon {
            font-size: 24px; color: var(--primary);
            margin-bottom: 15px;
            background: rgba(99, 102, 241, 0.05);
            width: 50px; height: 50px; line-height: 50px;
            border-radius: 15px; display: inline-block;
        }

        @media (max-width: 768px) {
            .form-grid, .info-rail { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .contact-wrapper { padding: 30px; border-radius: 30px; }
        }
    </style>
</head>
<body>

    <main class="container">
        <header class="page-header" data-aos="fade-down">
            <h1>Let's <span style="color: var(--primary);">Optimize</span> Together.</h1>
            <p>Ready to scale? Our architects are standing by.</p>
        </header>

        <section class="contact-wrapper" data-aos="zoom-in-up">
            <form id="synthForm">
                <div class="form-grid">
                    <div class="field-group">
                        <label>Identity Name</label>
                        <input type="text" class="input-ctrl" placeholder="John Wick" required>
                    </div>
                    <div class="field-group">
                        <label>Business Email</label>
                        <input type="email" class="input-ctrl" placeholder="john@continental.ai" required>
                    </div>
                    <div class="field-group full-width">
                        <label>Inquiry Classification</label>
                        <select class="input-ctrl">
                            <option>Enterprise Architecture</option>
                            <option>Cloud Infrastructure</option>
                            <option>Neural Network Design</option>
                            <option>Other Services</option>
                        </select>
                    </div>
                    <div class="field-group full-width">
                        <label>Communication Details</label>
                        <textarea class="input-ctrl" rows="4" placeholder="Briefly describe your requirements..."></textarea>
                    </div>
                </div>
                <button type="submit" class="btn-reveal" id="submitBtn">
                    INITIALIZE CONNECTION <i class="fas fa-paper-plane" style="margin-left: 10px;"></i>
                </button>
            </form>
        </section>

        <section class="info-rail">
            <div class="rail-item" data-aos="fade-up" data-aos-delay="100">
                <div class="rail-icon"><i class="fas fa-at"></i></div>
                <h4 style="font-size: 14px; margin-bottom: 5px;">Mailbox</h4>
                <p style="font-size: 13px; color: var(--text-muted); font-weight: 600;">pulse@digitalboost.ai</p>
            </div>
            <div class="rail-item" data-aos="fade-up" data-aos-delay="200">
                <div class="rail-icon"><i class="fas fa-phone"></i></div>
                <h4 style="font-size: 14px; margin-bottom: 5px;">Hotline</h4>
                <p style="font-size: 13px; color: var(--text-muted); font-weight: 600;">+1 800-SYNTH-01</p>
            </div>
            <div class="rail-item" data-aos="fade-up" data-aos-delay="300">
                <div class="rail-icon"><i class="fas fa-broadcast-tower"></i></div>
                <h4 style="font-size: 14px; margin-bottom: 5px;">Socials</h4>
                <div style="font-size: 16px; margin-top: 10px; display: flex; justify-content: center; gap: 15px;">
                    <i class="fab fa-twitter"></i> <i class="fab fa-linkedin"></i> <i class="fab fa-github"></i>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        document.getElementById('synthForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SYNCING...';
            btn.style.background = '#10b981';
            
            setTimeout(() => {
                btn.innerHTML = 'CONNECTION ESTABLISHED';
            }, 1800);
        });
    </script>
</body>
</html>
