<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalBoost | Contact Synthesis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #06b6d4;
            --bg: #fdfdff;
            --glass: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: rgba(99, 102, 241, 0.12);
        }

        /* --- Global Reset & Alignment --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 45%),
                radial-gradient(at 100% 0%, rgba(6, 182, 212, 0.1) 0px, transparent 45%),
                radial-gradient(at 50% 100%, rgba(168, 85, 247, 0.05) 0px, transparent 50%);
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 24px; 
        }

        /* --- Header: Typography Alignment --- */
        .page-header {
            text-align: center;
            padding: 100px 0 60px;
        }

        .page-header h1 { 
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 6vw, 3.8rem); 
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-bottom: 20px; 
        }

        .page-header p { 
            color: var(--text-muted); 
            font-size: 1.1rem; 
            font-weight: 500;
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- Contact Synthesis Core (The Form) --- */
        .contact-wrapper {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 60px;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(99, 102, 241, 0.08);
            margin-bottom: 80px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .full-width { grid-column: span 2; }

        .field-group { display: flex; flex-direction: column; gap: 10px; }

        .field-group label {
            font-size: 12px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding-left: 5px;
        }

        .input-ctrl {
            width: 100%;
            background: white;
            border: 2px solid var(--border);
            padding: 18px 24px;
            border-radius: 20px;
            font-family: inherit;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .input-ctrl:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .btn-reveal {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.25);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .btn-reveal:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 45px rgba(99, 102, 241, 0.35);
        }

        /* --- Information Rail (Footer Grid) --- */
        .info-rail {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 120px;
        }

        .rail-item {
            background: white;
            border: 1px solid var(--border);
            padding: 40px 30px;
            border-radius: 35px;
            text-align: center;
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .rail-item:hover { 
            border-color: var(--primary); 
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.05);
        }

        .rail-icon {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 20px;
            background: rgba(99, 102, 241, 0.06);
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 18px;
            display: inline-block;
        }

        /* --- Advanced Interaction Layer --- */
        @media (hover: hover) {
            * { cursor: none; }
            #cursor {
                width: 12px; height: 12px;
                background: var(--primary);
                border-radius: 50%;
                position: fixed;
                pointer-events: none;
                z-index: 10000;
                mix-blend-mode: multiply;
                transition: transform 0.15s ease-out;
            }
        }

        /* --- Mobile Responsive Realignment --- */
        @media (max-width: 992px) {
            .container { padding: 0 30px; }
            .info-rail { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .page-header { padding: 80px 0 40px; }
            .form-grid { grid-template-columns: 1fr; }
            .info-rail { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .contact-wrapper { padding: 40px 25px; border-radius: 30px; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <main class="container">
        <header class="page-header" data-aos="fade-down">
            <h1>Let's <span style="color: var(--primary);">Optimize</span> Together.</h1>
            <p>Our solution architects are ready to help you scale your neural infrastructure and cloud deployment.</p>
        </header>

        <section class="contact-wrapper" data-aos="zoom-in-up">
            <form id="synthForm">
                <div class="form-grid">
                    <div class="field-group" data-aos="fade-right" data-aos-delay="100">
                        <label>Identity Name</label>
                        <input type="text" class="input-ctrl" placeholder="e.g. John Wick" required>
                    </div>
                    
                    <div class="field-group" data-aos="fade-left" data-aos-delay="200">
                        <label>Business Email</label>
                        <input type="email" class="input-ctrl" placeholder="e.g. john@continental.ai" required>
                    </div>

                    <div class="field-group full-width" data-aos="fade-up" data-aos-delay="300">
                        <label>Inquiry Classification</label>
                        <select class="input-ctrl">
                            <option>Enterprise Architecture</option>
                            <option>Cloud Infrastructure</option>
                            <option>Neural Network Design</option>
                            <option>Digital Strategy Alignment</option>
                            <option>Other Services</option>
                        </select>
                    </div>

                    <div class="field-group full-width" data-aos="fade-up" data-aos-delay="400">
                        <label>Communication Details</label>
                        <textarea class="input-ctrl" rows="5" placeholder="Briefly describe your requirements or technical challenges..."></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-reveal" id="submitBtn">
                    INITIALIZE CONNECTION <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </section>

        <section class="info-rail">
            <div class="rail-item" data-aos="fade-up" data-aos-delay="100">
                <div class="rail-icon"><i class="fas fa-at"></i></div>
                <h4 style="font-size: 15px; margin-bottom: 8px; letter-spacing: 0.05em;">Digital Mailbox</h4>
                <p style="font-size: 14px; color: var(--text-muted); font-weight: 700;">pulse@digitalboost.ai</p>
            </div>

            <div class="rail-item" data-aos="fade-up" data-aos-delay="200">
                <div class="rail-icon"><i class="fas fa-phone"></i></div>
                <h4 style="font-size: 15px; margin-bottom: 8px; letter-spacing: 0.05em;">Voice Interface</h4>
                <p style="font-size: 14px; color: var(--text-muted); font-weight: 700;">+1 800-SYNTH-01</p>
            </div>

            <div class="rail-item" data-aos="fade-up" data-aos-delay="300">
                <div class="rail-icon"><i class="fas fa-broadcast-tower"></i></div>
                <h4 style="font-size: 15px; margin-bottom: 8px; letter-spacing: 0.05em;">Social Network</h4>
                <div style="font-size: 18px; margin-top: 12px; display: flex; justify-content: center; gap: 25px; color: var(--primary);">
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                    <a href="#"><i class="fab fa-github"></i></a>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialize Animation Library
        AOS.init({ 
            duration: 1000, 
            once: true,
            offset: 100 
        });

        // Form Logic & Alignment
        document.getElementById('synthForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SYNCING PARAMETERS...';
            btn.style.background = '#10b981';
            
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-check"></i> CONNECTION ESTABLISHED';
            }, 1800);
        });

        // Custom Cursor Movement
        const cursor = document.getElementById('cursor');
        if(cursor) {
            document.addEventListener('mousemove', e => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });

            // Interactive Element Scaling
            document.querySelectorAll('.input-ctrl, .btn-reveal, a, select').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.style.transform = 'scale(4)');
                el.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)');
            });
        }
    </script>
</body>
</html>
