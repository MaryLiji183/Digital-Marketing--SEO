<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalBoost | Command v2.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* --- 1. Design System --- */
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --border: rgba(99, 102, 241, 0.15);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --nav-width: 100px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%);
        }

        /* --- 2. Sidebar Navigation --- */
        .nav-hub {
            width: var(--nav-width);
            margin: 20px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-icon {
            width: 54px; height: 54px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 18px;
            margin-bottom: 25px;
            transition: 0.3s;
            font-size: 20px;
        }

        .nav-icon:hover, .nav-icon.active {
            background: var(--primary);
            color: white;
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        /* --- 3. Main Content Area --- */
        .dashboard-container {
            flex: 1;
            padding: 40px 40px 40px 20px;
            overflow-y: auto;
            perspective: 1000px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .top-bar h1 { font-family: 'Space Grotesk'; font-size: 32px; letter-spacing: -1.5px; }

        /* --- 4. Bento Grid System --- */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-auto-rows: 140px;
            gap: 25px;
        }

        .glass-widget {
            background: var(--card-bg);
            border: 1px solid white;
            border-radius: 35px;
            padding: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-widget:hover {
            transform: translateY(-8px);
            background: white;
            box-shadow: 0 30px 60px rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
        }

        /* Grid Spans */
        .col-4 { grid-column: span 4; }
        .col-2 { grid-column: span 2; }
        .row-2 { grid-row: span 2; }
        .row-3 { grid-row: span 3; }

        /* --- 5. UI Elements --- */
        .label { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        .value { font-size: 48px; font-weight: 800; color: var(--text-main); line-height: 1; }
        
        .pulse-ring {
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            position: relative;
        }
        .pulse-ring::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: var(--accent); border-radius: 50%;
            animation: ringPulse 2s infinite;
        }

        .mini-chart { display: flex; align-items: flex-end; gap: 10px; margin-top: 30px; height: 150px; }
        .bar { flex: 1; border-radius: 10px 10px 4px 4px; background: linear-gradient(to top, var(--primary), var(--secondary)); transition: 0.5s ease; }

        .status-pill {
            padding: 6px 12px; border-radius: 100px; font-size: 10px; font-weight: 800;
            background: rgba(16, 185, 129, 0.1); color: #10b981;
        }

        /* --- 6. Responsive Logic --- */
        @media (max-width: 1100px) {
            .grid-layout { grid-template-columns: repeat(4, 1fr); }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .nav-hub {
                width: calc(100% - 40px);
                height: 80px;
                flex-direction: row;
                padding: 0 30px;
                justify-content: space-between;
                margin: 20px auto;
            }
            .nav-icon { margin-bottom: 0; }
            .nav-hub div:first-child, .nav-hub div:last-child { display: none; }
            .dashboard-container { padding: 20px; }
            .grid-layout { grid-template-columns: 1fr; grid-auto-rows: auto; }
            .col-4, .col-2, .row-2, .row-3 { grid-column: span 1; grid-row: span 1; }
            .top-bar { flex-direction: column; align-items: flex-start; gap: 20px; }
        }

        @keyframes ringPulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body>

    <nav class="nav-hub">
        <div style="color: var(--primary); font-size: 28px; margin-bottom: 50px;"><i class="fas fa-compass"></i></div>
        <a href="index.html" class="nav-icon active"><i class="fas fa-th-large"></i></a>
        <a href="about.html" class="nav-icon"><i class="fas fa-wave-square"></i></a>
        <a href="contact.html" class="nav-icon"><i class="fas fa-layer-group"></i></a>
        <a href="portfolio.html" class="nav-icon"><i class="fas fa-bolt"></i></a>
        <div style="margin-top: auto;">
            <a href="contact.html" class="nav-icon"><i class="fas fa-user-circle"></i></a>
        </div>
    </nav>

    <main class="dashboard-container">
        <header class="top-bar" data-aos="fade-down">
            <div>
                <h1>Digital <span style="color: var(--primary);">Boost.</span></h1>
                <p style="color: var(--text-muted); font-weight: 600;">System Online • Node: Nexus-Alpha-01</p>
            </div>
            <div style="display: flex; gap: 15px;">
                <button style="padding: 15px 25px; border-radius: 20px; border: 1px solid var(--border); background: white; font-weight: 800; cursor: pointer; transition: 0.3s;">
                    <i class="fas fa-plus"></i> New Project
                </button>
            </div>
        </header>

        <section class="grid-layout">
            
            <div class="glass-widget col-4 row-3" data-aos="zoom-in">
                <span class="label">Processing Power</span>
                <div class="value">98.2<span style="font-size: 24px; color: var(--text-muted);">%</span></div>
                
                <div class="mini-chart">
                    <div class="bar" style="height: 40%;"></div>
                    <div class="bar" style="height: 70%;"></div>
                    <div class="bar" style="height: 55%;"></div>
                    <div class="bar" style="height: 90%;"></div>
                    <div class="bar" style="height: 65%;"></div>
                    <div class="bar" style="height: 85%;"></div>
                    <div class="bar" style="height: 100%;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 20px; font-weight: 700; font-size: 13px;">
                    <span>Peak Optimization</span>
                    <span style="color: var(--secondary);">High Load Detected</span>
                </div>
            </div>

            <div class="glass-widget col-2 row-2" data-aos="fade-left">
                <span class="label">Network Health</span>
                <div class="value" style="font-size: 32px;">Stable</div>
                <div style="margin-top: 30px; display: flex; align-items: center;">
                    <div class="pulse-ring"></div>
                    <span style="font-weight: 800; font-size: 14px;">All Nodes Verified</span>
                </div>
                <div style="margin-top: 20px; height: 4px; width: 100%; background: #e2e8f0; border-radius: 10px;">
                    <div style="width: 88%; height: 100%; background: var(--accent); border-radius: 10px;"></div>
                </div>
            </div>

            <div class="glass-widget col-2" data-aos="fade-up" data-aos-delay="100">
                <span class="label">Avg Latency</span>
                <div class="value" id="latencyVal" style="font-size: 36px;">18ms</div>
            </div>

            <div class="glass-widget col-2 row-2" data-aos="fade-up" data-aos-delay="200">
                <span class="label">Live Activity</span>
                <div style="margin-top: 15px;">
                    <div style="margin-bottom: 15px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px;">
                        <span class="status-pill">SUCCESS</span>
                        <p style="font-size: 12px; font-weight: 700; margin-top: 5px;">Data Sync: Global</p>
                    </div>
                    <div>
                        <span class="status-pill" style="background: rgba(99,102,241,0.1); color: var(--primary);">UPLINK</span>
                        <p style="font-size: 12px; font-weight: 700; margin-top: 5px;">Node 05: Online</p>
                    </div>
                </div>
            </div>

            <div class="glass-widget col-4" data-aos="fade-up" data-aos-delay="300">
                <div style="display: flex; justify-content: space-between; align-items: center; height: 100%;">
                    <div>
                        <span class="label">Bandwidth Used</span>
                        <div class="value" style="font-size: 32px;">44.8 GB</div>
                    </div>
                    <i class="fas fa-chart-line" style="font-size: 40px; color: var(--border);"></i>
                    <div style="text-align: right;">
                        <span class="label">Active Users</span>
                        <div class="value" style="font-size: 32px;">1,204</div>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialize Animations
        AOS.init({ duration: 1000, once: true });

        // Real-time Latency Simulation
        const latencyText = document.getElementById('latencyVal');
        setInterval(() => {
            const lat = 15 + Math.floor(Math.random() * 8);
            latencyText.innerText = lat + 'ms';
            
            // Subtle color shift if latency is high
            latencyText.style.color = lat > 20 ? 'var(--secondary)' : 'var(--text-main)';
        }, 2000);

        // Animate bars on load
        document.querySelectorAll('.bar').forEach(bar => {
            const targetHeight = bar.style.height;
            bar.style.height = '0%';
            setTimeout(() => {
                bar.style.height = targetHeight;
            }, 500);
        });
    </script>
</body>
</html>
